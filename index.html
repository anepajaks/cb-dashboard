<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CB Dashboard</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, get, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  const firebaseConfig = {
    apiKey: "AIzaSyBXNBdcPJQljFSczr_xe3utJfIawsew9ZA",
    authDomain: "cb-dashboard-f5363.firebaseapp.com",
    databaseURL: "https://cb-dashboard-f5363-default-rtdb.firebaseio.com",
    projectId: "cb-dashboard-f5363",
    storageBucket: "cb-dashboard-f5363.firebasestorage.app",
    messagingSenderId: "374367815458",
    appId: "1:374367815458:web:e3d2f4451331a171a5c77b"
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);
  window._db=db; window._ref=ref; window._get=get; window._set=set; window._onValue=onValue; window._remove=remove;
  window._authReady=signInAnonymously(auth).then(function(){
    window.firebaseReady=true; window.dispatchEvent(new Event('firebaseReady'));
  }).catch(function(e){ console.error('Auth error:',e);
    window.firebaseReady=true; window.dispatchEvent(new Event('firebaseReady'));
  });
</script>
<style>
:root {
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",sans-serif;
  --font-mono:"SF Mono",ui-monospace,Menlo,monospace;
  --radius:12px; --radius-lg:20px;
  --amber:#f5a623; --amber-dim:rgba(245,166,35,0.10);
  --teal:#00bfa5; --teal-dim:rgba(0,191,165,0.10);
  --green:#2ecc71; --red:#e55353; --blue:#4a9eff;
}
[data-theme="dark"] {
  --bg:#0a0a0f; --surface:#13131a; --surface2:#1c1c27; --border:#2a2a3d;
  --text:#e8e8f0; --text-dim:#7a7a9a; --text-muted:#4a4a6a;
  --nav-bg:rgba(10,10,15,0.9); --grid:rgba(245,166,35,0.025); --shadow:rgba(0,0,0,0.4);
}
[data-theme="light"] {
  --bg:#f5f5f7; --surface:#ffffff; --surface2:#ebebf0; --border:#d8d8e8;
  --text:#1a1a2e; --text-dim:#6e6e8a; --text-muted:#a0a0b8;
  --nav-bg:rgba(245,245,247,0.92); --grid:rgba(0,0,0,0.04); --shadow:rgba(0,0,0,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}

/* PASSCODE */
#passcode-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;transition:background .3s;}
.pc-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:48px;width:100%;max-width:400px;text-align:center;animation:fadeUp .4s ease forwards;box-shadow:0 8px 40px var(--shadow);}
.pc-logo{font-size:11px;letter-spacing:4px;color:var(--amber);text-transform:uppercase;margin-bottom:8px;}
.pc-title{font-size:26px;font-weight:700;margin-bottom:6px;}
.pc-sub{font-size:12px;color:var(--text-dim);margin-bottom:32px;line-height:1.6;}
.pc-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:13px 16px;color:var(--text);font-family:var(--font);font-size:15px;letter-spacing:4px;text-align:center;outline:none;transition:border-color .2s;margin-bottom:14px;}
.pc-input:focus{border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-dim);}
.pc-input.err{border-color:var(--red);animation:shake .3s ease;}
.pc-btn{width:100%;background:var(--amber);color:#0a0a0f;border:none;border-radius:var(--radius);padding:13px;font-family:var(--font);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:opacity .2s;}
.pc-btn:hover{opacity:.85;}
.pc-err{font-size:12px;color:var(--red);margin-top:10px;min-height:16px;}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:60px;border-bottom:1px solid var(--border);background:var(--nav-bg);backdrop-filter:blur(20px);position:sticky;top:0;z-index:10;transition:background .3s,border-color .3s;}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-dot{width:7px;height:7px;background:var(--amber);border-radius:50%;box-shadow:0 0 8px var(--amber);animation:pulse 2s infinite;}
.nav-name{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text);}
.nav-name span{color:var(--amber);}
.nav-links{display:flex;align-items:center;gap:4px;}
.nav-link{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:500;letter-spacing:.5px;text-decoration:none;color:var(--text-dim);transition:all .2s;border:1px solid transparent;}
.nav-link:hover{color:var(--text);background:var(--surface2);}
.nav-link.active{color:var(--amber);border-color:rgba(245,166,35,.25);background:var(--amber-dim);}
.nav-link.soon{opacity:.4;cursor:not-allowed;pointer-events:none;}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-date{font-size:11px;color:var(--text-dim);letter-spacing:1px;}
.theme-btn{width:34px;height:34px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .2s;}
.theme-btn:hover{border-color:var(--amber);}
.nav-logout{background:none;border:1px solid var(--border);color:var(--text-dim);font-family:var(--font);font-size:11px;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .2s;letter-spacing:1px;}
.nav-logout:hover{border-color:var(--red);color:var(--red);}

/* APP */
#app{display:none;position:relative;z-index:1;}
.main{max-width:1100px;margin:0 auto;padding:48px 40px;}

.page-header{margin-bottom:48px;animation:fadeUp .4s ease forwards;}
.page-label{font-size:11px;letter-spacing:3px;color:var(--amber);text-transform:uppercase;margin-bottom:8px;}
.page-title{font-size:clamp(28px,4vw,42px);font-weight:800;line-height:1.1;}

/* STATUS CARDS */
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:48px;animation:fadeUp .4s ease .08s both;}
.status-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 32px;position:relative;overflow:hidden;transition:all .2s;box-shadow:0 2px 12px var(--shadow);}
.status-card:hover{border-color:rgba(245,166,35,.3);transform:translateY(-2px);box-shadow:0 8px 32px var(--shadow);}
.status-card.teal-card:hover{border-color:rgba(0,191,165,.3);}
.status-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--amber),transparent);}
.status-card.teal-card::before{background:linear-gradient(90deg,#00bfa5,transparent);}
.status-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.status-card-type{font-size:10px;letter-spacing:3px;color:var(--text-muted);text-transform:uppercase;}
.status-badge{font-size:10px;letter-spacing:1px;padding:4px 10px;border-radius:20px;font-weight:600;}
.status-badge.ready{background:rgba(46,204,113,.12);color:var(--green);border:1px solid rgba(46,204,113,.2);}
.status-badge.missing{background:rgba(74,158,255,.1);color:var(--blue);border:1px solid rgba(74,158,255,.2);}
.status-badge.loading{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,166,35,.2);}
.status-card-title{font-size:20px;font-weight:700;margin-bottom:6px;}
.status-card-meta{font-size:11px;color:var(--text-dim);line-height:1.7;margin-bottom:20px;}
.status-card-meta strong{color:var(--text);font-weight:600;}
.card-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--radius);font-family:var(--font);font-size:12px;font-weight:600;letter-spacing:.5px;cursor:pointer;transition:all .2s;text-decoration:none;border:none;}
.card-btn.primary{background:var(--amber);color:#0a0a0f;}
.card-btn.primary:hover{opacity:.85;transform:translateY(-1px);}
.teal-card .card-btn.primary{background:var(--teal);}
.card-btn.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.card-btn.secondary:hover{border-color:var(--amber);color:var(--amber);transform:translateY(-1px);}
.teal-card .card-btn.secondary:hover{border-color:var(--teal);color:var(--teal);}

/* HISTORY */
.section-label{font-size:11px;letter-spacing:3px;color:var(--text-muted);text-transform:uppercase;margin-bottom:16px;animation:fadeUp .4s ease .15s both;}
.history-tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;width:fit-content;animation:fadeUp .4s ease .2s both;}
.history-tab{padding:8px 20px;border-radius:8px;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text-dim);transition:all .2s;}
.history-tab.active{background:var(--amber);color:#0a0a0f;font-weight:600;}
.history-tab.listing-tab.active{background:var(--teal);}
.history-list{display:flex;flex-direction:column;gap:10px;animation:fadeUp .4s ease .25s both;}

/* COLLAPSIBLE MONTH GROUP */
.month-group{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--surface);}
.month-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:none;border:none;color:var(--text);font-family:var(--font);font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:background .2s;}
.month-toggle:hover{background:var(--surface2);}
.month-toggle-left{display:flex;align-items:center;gap:10px;}
.month-count{font-size:10px;letter-spacing:1px;color:var(--text-muted);font-weight:400;}
.month-chevron{font-size:12px;color:var(--text-muted);transition:transform .25s;flex-shrink:0;}
.month-chevron.open{transform:rotate(180deg);}
.month-body{display:none;border-top:1px solid var(--border);padding:12px;}
.month-body.open{display:block;}

/* COLLAPSIBLE WEEK GROUP */
.week-group{margin-bottom:8px;}
.week-group:last-child{margin-bottom:0;}
.week-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font);font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);cursor:pointer;transition:all .2s;}
.week-toggle:hover{border-color:rgba(245,166,35,.25);color:var(--text);}
.week-chevron{font-size:11px;color:var(--text-muted);transition:transform .25s;flex-shrink:0;}
.week-chevron.open{transform:rotate(180deg);}
.week-body{display:none;padding-top:6px;}
.week-body.open{display:block;}

/* HISTORY ITEMS */
.history-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;transition:all .2s;box-shadow:0 1px 4px var(--shadow);margin-bottom:6px;cursor:pointer;}
.history-item:last-child{margin-bottom:0;}
.history-item:hover{border-color:rgba(245,166,35,.3);transform:translateX(4px);}
.history-item-left{display:flex;align-items:center;gap:14px;}
.history-icon{width:36px;height:36px;background:var(--amber-dim);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.history-title{font-size:13px;font-weight:600;margin-bottom:2px;}
.history-meta{font-size:11px;color:var(--text-dim);}
.history-right{display:flex;align-items:center;gap:14px;}
.history-time-wrap{text-align:right;}
.history-time{font-size:11px;color:var(--text-muted);}
.history-ago{font-size:11px;color:var(--amber);margin-top:2px;}
.delete-btn{width:30px;height:30px;border-radius:7px;background:none;border:1px solid transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;flex-shrink:0;}
.delete-btn:hover{border-color:rgba(229,83,83,.3);color:var(--red);background:rgba(229,83,83,.08);}

.empty-state{text-align:center;padding:48px;color:var(--text-muted);font-size:12px;letter-spacing:1px;border:1px dashed var(--border);border-radius:var(--radius-lg);}
.empty-icon{font-size:28px;margin-bottom:10px;opacity:.4;}

/* CONFIRM */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
.confirm-overlay.open{display:flex;}
.confirm-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;max-width:360px;width:100%;text-align:center;animation:fadeUp .25s ease forwards;box-shadow:0 8px 40px var(--shadow);}
.confirm-icon{font-size:28px;margin-bottom:12px;}
.confirm-title{font-size:16px;font-weight:700;margin-bottom:6px;}
.confirm-msg{font-size:13px;color:var(--text-dim);margin-bottom:24px;line-height:1.6;}
.confirm-btns{display:flex;gap:10px;justify-content:center;}
.confirm-yes{background:var(--red);color:#fff;border:none;border-radius:var(--radius);padding:10px 24px;font-family:var(--font);font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:opacity .2s;}
.confirm-yes:hover{opacity:.85;}
.confirm-cancel{background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);border-radius:var(--radius);padding:10px 24px;font-family:var(--font);font-size:12px;cursor:pointer;transition:all .2s;}
.confirm-cancel:hover{border-color:var(--amber);color:var(--amber);}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--amber);color:#0a0a0f;padding:11px 22px;border-radius:8px;font-size:12px;font-weight:700;letter-spacing:1px;z-index:999;animation:fadeUp .3s ease forwards;white-space:nowrap;}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* SKELETONS */
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
.sk{border-radius:6px;background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:600px 100%;animation:shimmer 1.4s infinite linear;}
.sk-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 32px;box-shadow:0 2px 12px var(--shadow);}
.sk-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sk-line{height:10px;display:block;}
.sk-w40{width:40%;}
.sk-w60{width:60%;}
.sk-w30{width:30%;}
.sk-w20{width:20%;}
.sk-w80{width:80%;}
.sk-h14{height:14px;}
.sk-h20{height:20px;}
.sk-h28{height:28px;}
.sk-pill{height:22px;width:70px;border-radius:20px;}
.sk-btn{height:36px;width:130px;border-radius:var(--radius);}
.sk-icon{width:36px;height:36px;border-radius:9px;flex-shrink:0;}
.sk-history-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;box-shadow:0 1px 4px var(--shadow);}
.sk-history-left{display:flex;align-items:center;gap:14px;flex:1;}
.sk-history-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.sk-group{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--surface);margin-bottom:10px;}
.sk-group-header{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.sk-group-body{padding:12px;display:flex;flex-direction:column;gap:6px;}

@media(max-width:768px){
  .nav{padding:0 20px;} .nav-date{display:none;}
  .main{padding:28px 20px;} .status-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div id="passcode-screen">
  <div class="pc-box">
    <div class="pc-logo">CB Dashboard</div>
    <div class="pc-title">Team Access</div>
    <div class="pc-sub">Enter the team passcode to continue</div>
    <input type="password" class="pc-input" id="pc-input" placeholder="· · · · · · · ·" maxlength="30">
    <button class="pc-btn" onclick="doPasscode()">ENTER</button>
    <div class="pc-err" id="pc-err"></div>
  </div>
</div>

<nav class="nav" id="nav" style="display:none">
  <a href="index.html" class="nav-brand">
    <div class="nav-dot"></div>
    <div class="nav-name">CB <span>Dashboard</span></div>
  </a>
  <div class="nav-links">
    <a href="index.html" class="nav-link active">Home</a>
    <a href="reminder.html" class="nav-link">Reminder</a>
    <a href="listing.html" class="nav-link">Listing</a>
    <a href="listing.html" class="nav-link" id="analytics-shortcut" style="display:none">&#128202; Analytics</a>
    <a href="settings.html" class="nav-link">Settings</a>
  </div>
  <div class="nav-right">
    <div class="nav-date" id="nav-date"></div>
    <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
    <button class="nav-logout" onclick="logout()">LOGOUT</button>
  </div>
</nav>

<div id="app">
  <div class="main">
    <div class="page-header">
      <div class="page-label">Overview</div>
      <div class="page-title">Chargeback<br>Dashboard</div>
    </div>
    <!-- STATUS CARDS — skeletons shown until data loads -->
    <div class="status-grid" id="status-grid-skeleton">
      <div class="sk-card">
        <div class="sk-row"><span class="sk sk-line sk-w30"></span><span class="sk sk-pill"></span></div>
        <div class="sk sk-line sk-h28 sk-w60" style="margin-bottom:10px;"></div>
        <div class="sk sk-line sk-w80" style="margin-bottom:6px;"></div>
        <div class="sk sk-line sk-w40" style="margin-bottom:20px;"></div>
        <div class="sk sk-btn"></div>
      </div>
      <div class="sk-card">
        <div class="sk-row"><span class="sk sk-line sk-w30"></span><span class="sk sk-pill"></span></div>
        <div class="sk sk-line sk-h28 sk-w60" style="margin-bottom:10px;"></div>
        <div class="sk sk-line sk-w80" style="margin-bottom:6px;"></div>
        <div class="sk sk-line sk-w40" style="margin-bottom:20px;"></div>
        <div class="sk sk-btn"></div>
      </div>
    </div>
    <div class="status-grid" id="status-grid-real" style="display:none">
      <div class="status-card">
        <div class="status-card-header">
          <div class="status-card-type">Reminder</div>
          <div class="status-badge loading" id="reminder-badge">Loading...</div>
        </div>
        <div class="status-card-title" id="reminder-title">—</div>
        <div class="status-card-meta" id="reminder-meta">Checking...</div>
        <div id="reminder-actions"></div>
      </div>
      <div class="status-card teal-card">
        <div class="status-card-header">
          <div class="status-card-type">Listing</div>
          <div class="status-badge loading" id="listing-badge">Loading...</div>
        </div>
        <div class="status-card-title" id="listing-title">—</div>
        <div class="status-card-meta" id="listing-meta">Checking...</div>
        <div id="listing-actions"></div>
      </div>
    </div>

    <div class="section-label">History</div>
    <div class="history-tabs">
      <button class="history-tab active" onclick="switchTab('reminder')">Reminders</button>
      <button class="history-tab listing-tab" onclick="switchTab('listing')">Listings</button>
    </div>

    <!-- HISTORY skeleton shown until data loads -->
    <div id="history-skeleton">
      <div class="sk-group">
        <div class="sk-group-header">
          <span class="sk sk-line sk-w30 sk-h14"></span>
          <span class="sk sk-line sk-w20" style="height:10px;"></span>
        </div>
        <div class="sk-group-body">
          <div class="sk-history-item">
            <div class="sk-history-left"><span class="sk sk-icon"></span><div style="flex:1"><div class="sk sk-line sk-w60 sk-h14" style="margin-bottom:6px;"></div><div class="sk sk-line sk-w40" style="height:10px;"></div></div></div>
            <div class="sk-history-right"><div class="sk sk-line sk-w20 sk-h14" style="width:80px;"></div><div class="sk sk-line" style="width:60px;height:10px;"></div></div>
          </div>
          <div class="sk-history-item">
            <div class="sk-history-left"><span class="sk sk-icon"></span><div style="flex:1"><div class="sk sk-line sk-w60 sk-h14" style="margin-bottom:6px;"></div><div class="sk sk-line sk-w40" style="height:10px;"></div></div></div>
            <div class="sk-history-right"><div class="sk sk-line sk-w20 sk-h14" style="width:80px;"></div><div class="sk sk-line" style="width:60px;height:10px;"></div></div>
          </div>
          <div class="sk-history-item">
            <div class="sk-history-left"><span class="sk sk-icon"></span><div style="flex:1"><div class="sk sk-line sk-w60 sk-h14" style="margin-bottom:6px;"></div><div class="sk sk-line sk-w40" style="height:10px;"></div></div></div>
            <div class="sk-history-right"><div class="sk sk-line sk-w20 sk-h14" style="width:80px;"></div><div class="sk sk-line" style="width:60px;height:10px;"></div></div>
          </div>
        </div>
      </div>
      <div class="sk-group">
        <div class="sk-group-header">
          <span class="sk sk-line sk-w30 sk-h14"></span>
          <span class="sk sk-line sk-w20" style="height:10px;"></span>
        </div>
        <div class="sk-group-body">
          <div class="sk-history-item">
            <div class="sk-history-left"><span class="sk sk-icon"></span><div style="flex:1"><div class="sk sk-line sk-w60 sk-h14" style="margin-bottom:6px;"></div><div class="sk sk-line sk-w40" style="height:10px;"></div></div></div>
            <div class="sk-history-right"><div class="sk sk-line sk-w20 sk-h14" style="width:80px;"></div><div class="sk sk-line" style="width:60px;height:10px;"></div></div>
          </div>
          <div class="sk-history-item">
            <div class="sk-history-left"><span class="sk sk-icon"></span><div style="flex:1"><div class="sk sk-line sk-w60 sk-h14" style="margin-bottom:6px;"></div><div class="sk sk-line sk-w40" style="height:10px;"></div></div></div>
            <div class="sk-history-right"><div class="sk sk-line sk-w20 sk-h14" style="width:80px;"></div><div class="sk sk-line" style="width:60px;height:10px;"></div></div>
          </div>
        </div>
      </div>
    </div>
    <div class="history-list" id="history-list" style="display:none"></div>
  </div>
</div>

<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-icon">🗑️</div>
    <div class="confirm-title">Delete Entry?</div>
    <div class="confirm-msg" id="confirm-msg">This will permanently remove this entry.</div>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="confirm-yes" id="confirm-yes-btn">Delete</button>
    </div>
  </div>
</div>

<script>
// THEME
(function(){
  const t=localStorage.getItem('cb_theme')||'dark';
  document.documentElement.setAttribute('data-theme',t);
})();
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme');
  const next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('cb_theme',next);
  document.getElementById('theme-btn').textContent=next==='dark'?'🌙':'☀️';
}
function updateThemeBtn(){
  const t=document.documentElement.getAttribute('data-theme');
  const btn=document.getElementById('theme-btn');
  if(btn) btn.textContent=t==='dark'?'🌙':'☀️';
}
updateThemeBtn();

// STATE
let currentTab='reminder', allReminders={}, allListings={};
let pendingDelete=null;

// HELPERS
function formatDate(ts){if(!ts)return'—';return new Date(ts).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function timeAgo(ts){
  const diff=Date.now()-ts, s=Math.floor(diff/1000);
  if(s<60)return`${s} seconds ago`;
  const m=Math.floor(s/60); if(m<60)return`${m} minute${m>1?'s':''} ago`;
  const h=Math.floor(m/60); if(h<24)return`${h} hour${h>1?'s':''} ago`;
  const day=Math.floor(h/24); return`${day} day${day>1?'s':''} ago`;
}

// todayISO: returns "YYYY-MM-DD" for today using local date (no UTC shift)
function todayISO(){
  const d=new Date();
  const yyyy=d.getFullYear();
  const mm=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  return`${yyyy}-${mm}-${dd}`;
}

// isReminderReadyToday: returns true if today falls within [due_date_start, due_date_end]
// Falls back to key-based check for old records that don't have due_date_end yet
function isReminderReadyToday(rec, key){
  if(!rec||!rec.cases)return false;
  const today=todayISO();

  // New records: use due_date_start and due_date_end fields
  if(rec.due_date_end){
    const start=rec.due_date_start||rec.due_date_end;
    return today>=start&&today<=rec.due_date_end;
  }

  // Legacy fallback: parse key format "16_May_2026" and compare to today
  // Key is based on earliest due date — for single-day reminders this is sufficient
  // For old 3-day reminders without due_date_end we cannot reliably detect — show as not ready
  if(!key)return false;
  try{
    const parts=key.split('_');
    if(parts.length!==3)return false;
    const d=new Date(`${parts[1]} ${parts[0]}, ${parts[2]}`);
    if(isNaN(d))return false;
    const keyISO=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    return keyISO===today;
  }catch(e){return false;}
}

// HASH UTILITY — SHA-256 via Web Crypto (built into all modern browsers, no library needed)
async function hashPasscode(plain){
  const encoded=new TextEncoder().encode(plain);
  const buf=await crypto.subtle.digest('SHA-256',encoded);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// PASSCODE — sessionStorage stores raw input; comparisons always use hash
function doPasscode(){
  const val=document.getElementById('pc-input').value.trim();
  const err=document.getElementById('pc-err');
  if(!val){err.textContent='Enter passcode.';return;}
  async function tryLogin(){
    try{
      const stored=await window._get(window._ref(window._db,'config/passcode')).then(s=>s.val());
      const hashed=await hashPasscode(val);
      if(!stored){
        // First-ever launch: save hash of initial passcode
        await window._set(window._ref(window._db,'config/passcode'),hashed);
        sessionStorage.setItem('cb_auth',val); enterApp();
      } else if(hashed===stored){
        sessionStorage.setItem('cb_auth',val); enterApp();
      } else {
        err.textContent='Incorrect passcode.';
        const inp=document.getElementById('pc-input');
        inp.classList.add('err'); setTimeout(()=>inp.classList.remove('err'),400);
      }
    }catch(e){err.textContent='Cannot connect.';}
  }
  const execLogin=()=>{(window._authReady||Promise.resolve()).then(tryLogin).catch(tryLogin);};
  if(window.firebaseReady)execLogin();
  else window.addEventListener('firebaseReady',execLogin,{once:true});
}
document.getElementById('pc-input').addEventListener('keydown',e=>{if(e.key==='Enter')doPasscode();});

// Auto-login — re-hashes stored raw value and compares to DB hash
(function(){
  const stored=sessionStorage.getItem('cb_auth');
  if(stored){
    document.getElementById('passcode-screen').style.display='none';
    async function verifyAndEnter(){
      async function doCheck(){
        try{
          const dbHash=await window._get(window._ref(window._db,'config/passcode')).then(s=>s.val());
          const inputHash=await hashPasscode(stored);
          if(inputHash===dbHash){ enterApp(); }
          else{ sessionStorage.removeItem('cb_auth'); document.getElementById('passcode-screen').style.display='flex'; }
        }catch(e){ enterApp(); }
      }
      (window._authReady||Promise.resolve()).then(doCheck).catch(doCheck);
    }
    if(window.firebaseReady) verifyAndEnter();
    else window.addEventListener('firebaseReady', verifyAndEnter, {once:true});
  }
})();

function enterApp(){
  document.getElementById('passcode-screen').style.display='none';
  document.getElementById('nav').style.display='flex';
  document.getElementById('app').style.display='block';
  document.getElementById('nav-date').textContent=
    new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'}).toUpperCase();
  loadData();
}
function logout(){sessionStorage.removeItem('cb_auth');location.reload();}

// DATA — fetch metadata only, hide skeletons when both loads complete
let _remindersLoaded=false, _listingsLoaded=false;
function revealWhenReady(){
  if(!_remindersLoaded||!_listingsLoaded)return;
  // Hide skeletons, show real content
  document.getElementById('status-grid-skeleton').style.display='none';
  document.getElementById('status-grid-real').style.display='';
  document.getElementById('history-skeleton').style.display='none';
  document.getElementById('history-list').style.display='';
}
function loadData(){
  window._get(window._ref(window._db,'reminders_meta')).then(snap=>{
    allReminders=snap.val()||{};
    _remindersLoaded=true;
    updateReminderCard();
    if(currentTab==='reminder') renderHistory();
    revealWhenReady();
  }).catch(()=>{_remindersLoaded=true;updateReminderCard();revealWhenReady();});

  window._get(window._ref(window._db,'listings_meta')).then(snap=>{
    allListings=snap.val()||{};
    _listingsLoaded=true;
    updateListingCard();
    if(currentTab==='listing') renderHistory();
    revealWhenReady();
  }).catch(()=>{_listingsLoaded=true;updateListingCard();revealWhenReady();});
}

// STATUS CARDS
function updateReminderCard(){
  // Find a reminder where today falls within its due date range
  const keys=Object.keys(allReminders);
  let todayKey=null;
  let todayRec=null;
  keys.forEach(k=>{
    if(isReminderReadyToday(allReminders[k],k)){
      // If multiple match (edge case), prefer latest generated_at
      if(!todayRec||(allReminders[k].generated_at||0)>(todayRec.generated_at||0)){
        todayKey=k;
        todayRec=allReminders[k];
      }
    }
  });

  const isReady=!!(todayRec&&todayRec.cases);
  document.getElementById('reminder-badge').className='status-badge '+(isReady?'ready':'missing');
  document.getElementById('reminder-badge').textContent=isReady?'Ready':'Not generated';

  if(isReady){
    // Show the deadline label if available, else fall back to key
    const label=todayRec.deadline||todayKey.replace(/_/g,' ');
    document.getElementById('reminder-title').textContent=label;
    document.getElementById('reminder-meta').innerHTML=
      `Generated by <strong>${todayRec.generated_by}</strong><br>${timeAgo(todayRec.generated_at)}`;
    document.getElementById('reminder-actions').innerHTML=
      `<a href="reminder.html?key=${todayKey}" class="card-btn secondary">View Reminder →</a>`;
  } else {
    document.getElementById('reminder-title').textContent='No reminder for today';
    document.getElementById('reminder-meta').innerHTML='No reminder generated for today yet';
    document.getElementById('reminder-actions').innerHTML=
      `<a href="reminder.html" class="card-btn primary">Go to Reminder →</a>`;
  }
}

function updateListingCard(){
  // Sort by month number (nearest past month first), not generated_at timestamp
  const MONS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const now=new Date();
  const nowNum=now.getFullYear()*100+(now.getMonth()+1);
  const keys=Object.keys(allListings).sort((a,b)=>{
    const pa=a.split('_'),pb=b.split('_');
    const na=(parseInt(pa[1])||0)*100+(MONS.indexOf(pa[0])+1);
    const nb=(parseInt(pb[1])||0)*100+(MONS.indexOf(pb[0])+1);
    // Prefer nearest past month to today
    const da=Math.abs(nowNum-na), db=Math.abs(nowNum-nb);
    return da-db;
  });
  const key=keys[0], rec=key?allListings[key]:null;
  document.getElementById('listing-badge').className='status-badge '+(rec&&rec.cases?'ready':'missing');
  document.getElementById('listing-badge').textContent=rec&&rec.cases?'Ready':'Not generated';
  document.getElementById('listing-title').textContent=rec&&rec.cases?key.replace(/_/g,' '):'No listings yet';
  document.getElementById('listing-meta').innerHTML=rec&&rec.cases
    ?`Generated by <strong>${rec.generated_by}</strong><br>${timeAgo(rec.generated_at)}`
    :'No listing generated yet';
  document.getElementById('listing-actions').innerHTML=rec&&rec.cases
    ?`<a href="listing.html?key=${key}" class="card-btn secondary">View Listing →</a>`
    :`<a href="listing.html" class="card-btn primary">Go to Listing →</a>`;
}

// HISTORY — Month/Week collapsible
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.history-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='reminder')||(i===1&&tab==='listing')));
  if(_remindersLoaded&&_listingsLoaded) renderHistory();
}

// getWeekOfMonth: returns 1-based week number within the month
// Week 1 = days 1-7, Week 2 = 8-14, Week 3 = 15-21, Week 4 = 22-28, Week 5 = 29+
function getWeekOfMonth(d){
  return Math.ceil(d.getDate()/7);
}

// getGroupingDate: use due_date_start for grouping if available, else fall back to generated_at
// This ensures a reminder due on 1 May groups into May Week 1,
// regardless of when it was generated.
function getGroupingDate(rec){
  if(rec.due_date_start){
    // due_date_start is "YYYY-MM-DD" — parse as local date to avoid UTC shift
    const parts=rec.due_date_start.split('-');
    if(parts.length===3){
      return new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
    }
  }
  // Legacy fallback: use generated_at timestamp
  return new Date(rec.generated_at||0);
}

function renderHistory(){
  const list=document.getElementById('history-list');
  const data=currentTab==='reminder'?allReminders:allListings;
  const keys=Object.keys(data).sort((a,b)=>(data[b].generated_at||0)-(data[a].generated_at||0));
  const icon=currentTab==='reminder'?'🔔':'📊';
  const target=currentTab==='reminder'?'reminder.html':'listing.html';

  if(!keys.length){
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">${icon}</div>No ${currentTab}s generated yet</div>`;
    return;
  }

  // LISTINGS: group by year only — use year from the key (e.g. "June_2025" → 2025)
  // NOT generated_at (which is when it was saved, potentially a different year)
  if(currentTab==='listing'){
    const yearGroups={};
    keys.forEach(key=>{
      const parts=key.split('_');
      const parsedYr=parts.length>=2?parseInt(parts[parts.length-1]):NaN;
      const yr=(!isNaN(parsedYr)&&parsedYr>2000)?parsedYr.toString():new Date((data[key].generated_at)||0).getFullYear().toString();
      if(!yearGroups[yr])yearGroups[yr]=[];
      yearGroups[yr].push(key);
    });
    const sortedYears=Object.keys(yearGroups).sort((a,b)=>b-a);
    list.innerHTML=sortedYears.map((yr,yIdx)=>{
      const yKeys=yearGroups[yr];
      const itemsHTML=yKeys.map(key=>{
        const rec=data[key];
        const displayTitle=key.replace(/_/g,' ');
        return`<div class="history-item" onclick="window.location.href='${target}?key=${key}'">
          <div class="history-item-left">
            <div class="history-icon">${icon}</div>
            <div>
              <div class="history-title">${displayTitle}</div>
              <div class="history-meta">By ${rec.generated_by||'—'}</div>
            </div>
          </div>
          <div class="history-right">
            <div class="history-time-wrap">
              <div class="history-time">${formatDate(rec.generated_at)}</div>
              <div class="history-ago">${timeAgo(rec.generated_at)}</div>
            </div>
            <button class="delete-btn" onclick="event.stopPropagation();confirmDelete('${currentTab}','${key}')" title="Delete">🗑</button>
          </div>
        </div>`;
      }).join('');
      const yId=`year-${yIdx}`;
      return`<div class="month-group">
        <button class="month-toggle" onclick="toggleMonth('${yId}')">
          <span class="month-toggle-left">
            <span>${yr}</span>
            <span class="month-count">${yKeys.length} listing${yKeys.length>1?'s':''}</span>
          </span>
          <span class="month-chevron" id="mc-${yId}">▾</span>
        </button>
        <div class="month-body" id="${yId}">${itemsHTML}</div>
      </div>`;
    }).join('');
    return;
  }

  // REMINDERS: group by month, then by week (unchanged)
  const monthGroups={};
  keys.forEach(key=>{
    const d=getGroupingDate(data[key]);
    const mLabel=d.toLocaleString('en-GB',{month:'long',year:'numeric'});
    const wNum=getWeekOfMonth(d);
    const wLabel=`Week ${wNum}`;
    if(!monthGroups[mLabel])monthGroups[mLabel]={};
    if(!monthGroups[mLabel][wLabel])monthGroups[mLabel][wLabel]=[];
    monthGroups[mLabel][wLabel].push(key);
  });

  list.innerHTML=Object.keys(monthGroups).map((month,mIdx)=>{
    const weeks=monthGroups[month];
    const totalInMonth=Object.values(weeks).reduce((sum,arr)=>sum+arr.length,0);
    const weeksHTML=Object.keys(weeks).map((week,wIdx)=>{
      const weekKeys=weeks[week];
      const weekId=`week-${mIdx}-${wIdx}`;
      const itemsHTML=weekKeys.map(key=>{
        const rec=data[key];
        const displayTitle=rec.deadline||key.replace(/_/g,' ');
        return`<div class="history-item" onclick="window.location.href='${target}?key=${key}'">
          <div class="history-item-left">
            <div class="history-icon">${icon}</div>
            <div>
              <div class="history-title">${displayTitle}</div>
              <div class="history-meta">By ${rec.generated_by||'—'}</div>
            </div>
          </div>
          <div class="history-right">
            <div class="history-time-wrap">
              <div class="history-time">${formatDate(rec.generated_at)}</div>
              <div class="history-ago">${timeAgo(rec.generated_at)}</div>
            </div>
            <button class="delete-btn" onclick="event.stopPropagation();confirmDelete('${currentTab}','${key}')" title="Delete">🗑</button>
          </div>
        </div>`;
      }).join('');
      return`<div class="week-group">
        <button class="week-toggle" onclick="toggleWeek('${weekId}')">
          <span>${week} <span style="color:var(--text-muted);font-weight:400">(${weekKeys.length})</span></span>
          <span class="week-chevron" id="wc-${weekId}">▾</span>
        </button>
        <div class="week-body" id="${weekId}">${itemsHTML}</div>
      </div>`;
    }).join('');
    const monthId=`month-${mIdx}`;
    return`<div class="month-group">
      <button class="month-toggle" onclick="toggleMonth('${monthId}')">
        <span class="month-toggle-left">
          <span>${month}</span>
          <span class="month-count">${totalInMonth} item${totalInMonth>1?'s':''}</span>
        </span>
        <span class="month-chevron" id="mc-${monthId}">▾</span>
      </button>
      <div class="month-body" id="${monthId}">${weeksHTML}</div>
    </div>`;
  }).join('');
}

// Toggle month collapse
function toggleMonth(id){
  const body=document.getElementById(id);
  const chevron=document.getElementById('mc-'+id);
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  chevron.classList.toggle('open',!isOpen);
}

// Toggle week collapse
function toggleWeek(id){
  const body=document.getElementById(id);
  const chevron=document.getElementById('wc-'+id);
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  chevron.classList.toggle('open',!isOpen);
}

function confirmDelete(type,key){
  pendingDelete={type,key};
  document.getElementById('confirm-msg').textContent=`Delete "${key.replace(/_/g,' ')}"? This cannot be undone.`;
  document.getElementById('confirm-yes-btn').onclick=doDelete;
  document.getElementById('confirm-overlay').classList.add('open');
}
function doDelete(){
  if(!pendingDelete)return;
  const {type,key}=pendingDelete;
  const path=type==='reminder'?`reminders/${key}`:`listings/${key}`;
  const metaPath=type==='reminder'?`reminders_meta/${key}`:`listings_meta/${key}`;
  window._remove(window._ref(window._db,path)).then(()=>{
    return window._remove(window._ref(window._db,metaPath));
  }).then(()=>{
    // Refresh local state and re-render
    if(type==='reminder'){
      delete allReminders[key];
      updateReminderCard();
      if(currentTab==='reminder')renderHistory();
    } else {
      delete allListings[key];
      updateListingCard();
      if(currentTab==='listing')renderHistory();
    }
    toast('Entry deleted');
    closeConfirm();
  }).catch(e=>alert('Delete failed: '+e.message));
}
function closeConfirm(){document.getElementById('confirm-overlay').classList.remove('open');pendingDelete=null;}
document.getElementById('confirm-overlay').addEventListener('click',function(e){if(e.target===this)closeConfirm();});
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent='✓ '+msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2800);}
</script>
