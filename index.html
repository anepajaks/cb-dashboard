<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CB Dashboard</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, get, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  const app = initializeApp({ databaseURL: "https://cb-dashboard-f5363-default-rtdb.firebaseio.com" });
  const db = getDatabase(app);
  window._db=db; window._ref=ref; window._get=get; window._set=set; window._onValue=onValue; window._remove=remove;
  window.firebaseReady=true; window.dispatchEvent(new Event('firebaseReady'));
</script>
<style>
:root {
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",sans-serif;
  --font-mono:"SF Mono",ui-monospace,Menlo,monospace;
  --radius:12px; --radius-lg:20px;
  --amber:#f5a623; --amber-dim:rgba(245,166,35,0.10);
  --green:#2ecc71; --red:#e55353; --blue:#4a9eff;
}
[data-theme="dark"] {
  --bg:#0a0a0f; --surface:#13131a; --surface2:#1c1c27; --border:#2a2a3d;
  --text:#e8e8f0; --text-dim:#7a7a9a; --text-muted:#4a4a6a;
  --nav-bg:rgba(10,10,15,0.9); --grid:rgba(245,166,35,0.025); --shadow:rgba(0,0,0,0.4);
}
[data-theme="light"] {
  --bg:#f5f5f7; --surface:#ffffff; --surface2:#ebebf0; --border:#d8d8e8;
  --text:#1a1a2e; --text-dim:#6e6e8a; --text-muted:#a0a0b8;
  --nav-bg:rgba(245,245,247,0.92); --grid:rgba(0,0,0,0.04); --shadow:rgba(0,0,0,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}

/* PASSCODE */
#passcode-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;transition:background .3s;}
.pc-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:48px;width:100%;max-width:400px;text-align:center;animation:fadeUp .4s ease forwards;box-shadow:0 8px 40px var(--shadow);}
.pc-logo{font-size:11px;letter-spacing:4px;color:var(--amber);text-transform:uppercase;margin-bottom:8px;}
.pc-title{font-size:26px;font-weight:700;margin-bottom:6px;}
.pc-sub{font-size:12px;color:var(--text-dim);margin-bottom:32px;line-height:1.6;}
.pc-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:13px 16px;color:var(--text);font-family:var(--font);font-size:15px;letter-spacing:4px;text-align:center;outline:none;transition:border-color .2s;margin-bottom:14px;}
.pc-input:focus{border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-dim);}
.pc-input.err{border-color:var(--red);animation:shake .3s ease;}
.pc-btn{width:100%;background:var(--amber);color:#0a0a0f;border:none;border-radius:var(--radius);padding:13px;font-family:var(--font);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:opacity .2s;}
.pc-btn:hover{opacity:.85;}
.pc-err{font-size:12px;color:var(--red);margin-top:10px;min-height:16px;}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:60px;border-bottom:1px solid var(--border);background:var(--nav-bg);backdrop-filter:blur(20px);position:sticky;top:0;z-index:10;transition:background .3s,border-color .3s;}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-dot{width:7px;height:7px;background:var(--amber);border-radius:50%;box-shadow:0 0 8px var(--amber);animation:pulse 2s infinite;}
.nav-name{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text);}
.nav-name span{color:var(--amber);}
.nav-links{display:flex;align-items:center;gap:4px;}
.nav-link{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:500;letter-spacing:.5px;text-decoration:none;color:var(--text-dim);transition:all .2s;border:1px solid transparent;}
.nav-link:hover{color:var(--text);background:var(--surface2);}
.nav-link.active{color:var(--amber);border-color:rgba(245,166,35,.25);background:var(--amber-dim);}
.nav-link.soon{opacity:.4;cursor:not-allowed;pointer-events:none;}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-date{font-size:11px;color:var(--text-dim);letter-spacing:1px;}
.theme-btn{width:34px;height:34px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .2s;}
.theme-btn:hover{border-color:var(--amber);}
.nav-logout{background:none;border:1px solid var(--border);color:var(--text-dim);font-family:var(--font);font-size:11px;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .2s;letter-spacing:1px;}
.nav-logout:hover{border-color:var(--red);color:var(--red);}

/* APP */
#app{display:none;position:relative;z-index:1;}
.main{max-width:1100px;margin:0 auto;padding:48px 40px;}

.page-header{margin-bottom:48px;animation:fadeUp .4s ease forwards;}
.page-label{font-size:11px;letter-spacing:3px;color:var(--amber);text-transform:uppercase;margin-bottom:8px;}
.page-title{font-size:clamp(28px,4vw,42px);font-weight:800;line-height:1.1;}

/* STATUS CARDS */
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:48px;animation:fadeUp .4s ease .08s both;}
.status-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 32px;position:relative;overflow:hidden;transition:all .2s;box-shadow:0 2px 12px var(--shadow);}
.status-card:hover{border-color:rgba(245,166,35,.3);transform:translateY(-2px);box-shadow:0 8px 32px var(--shadow);}
.status-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--amber),transparent);}
.status-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.status-card-type{font-size:10px;letter-spacing:3px;color:var(--text-muted);text-transform:uppercase;}
.status-badge{font-size:10px;letter-spacing:1px;padding:4px 10px;border-radius:20px;font-weight:600;}
.status-badge.ready{background:rgba(46,204,113,.12);color:var(--green);border:1px solid rgba(46,204,113,.2);}
.status-badge.missing{background:rgba(74,158,255,.1);color:var(--blue);border:1px solid rgba(74,158,255,.2);}
.status-badge.loading{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,166,35,.2);}
.status-card-title{font-size:20px;font-weight:700;margin-bottom:6px;}
.status-card-meta{font-size:11px;color:var(--text-dim);line-height:1.7;margin-bottom:20px;}
.status-card-meta strong{color:var(--text);font-weight:600;}
.card-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--radius);font-family:var(--font);font-size:12px;font-weight:600;letter-spacing:.5px;cursor:pointer;transition:all .2s;text-decoration:none;border:none;}
.card-btn.primary{background:var(--amber);color:#0a0a0f;}
.card-btn.primary:hover{opacity:.85;transform:translateY(-1px);}
.card-btn.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.card-btn.secondary:hover{border-color:var(--amber);color:var(--amber);transform:translateY(-1px);}

/* HISTORY */
.section-label{font-size:11px;letter-spacing:3px;color:var(--text-muted);text-transform:uppercase;margin-bottom:16px;animation:fadeUp .4s ease .15s both;}
.history-tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;width:fit-content;animation:fadeUp .4s ease .2s both;}
.history-tab{padding:8px 20px;border-radius:8px;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text-dim);transition:all .2s;}
.history-tab.active{background:var(--amber);color:#0a0a0f;font-weight:600;}
.history-list{display:flex;flex-direction:column;gap:10px;animation:fadeUp .4s ease .25s both;}
.history-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;transition:all .2s;box-shadow:0 1px 4px var(--shadow);}
.history-item:hover{border-color:rgba(245,166,35,.3);transform:translateX(4px);}
.history-item-left{display:flex;align-items:center;gap:16px;}
.history-icon{width:38px;height:38px;background:var(--amber-dim);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.history-title{font-size:14px;font-weight:600;margin-bottom:3px;}
.history-meta{font-size:11px;color:var(--text-dim);}
.history-right{text-align:right;}
.history-time{font-size:11px;color:var(--text-muted);}
.history-ago{font-size:11px;color:var(--amber);margin-top:2px;}
.empty-state{text-align:center;padding:48px;color:var(--text-muted);font-size:12px;letter-spacing:1px;border:1px dashed var(--border);border-radius:var(--radius-lg);}
.empty-icon{font-size:28px;margin-bottom:10px;opacity:.4;}
.month-group{margin-bottom:28px;}
.month-label{font-size:10px;letter-spacing:3px;color:var(--text-muted);text-transform:uppercase;margin-bottom:10px;padding:0 4px;}
.history-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;transition:all .2s;box-shadow:0 1px 4px var(--shadow);margin-bottom:8px;}
.history-item:last-child{margin-bottom:0;}
.history-item:hover{border-color:rgba(245,166,35,.3);transform:translateX(4px);}
.history-item-left{display:flex;align-items:center;gap:16px;}
.history-icon{width:38px;height:38px;background:var(--amber-dim);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.history-title{font-size:14px;font-weight:600;margin-bottom:3px;}
.history-meta{font-size:11px;color:var(--text-dim);}
.history-right{display:flex;align-items:center;gap:14px;}
.history-time-wrap{text-align:right;}
.history-time{font-size:11px;color:var(--text-muted);}
.history-ago{font-size:11px;color:var(--amber);margin-top:2px;}
.delete-btn{width:30px;height:30px;border-radius:7px;background:none;border:1px solid transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;flex-shrink:0;}
.delete-btn:hover{border-color:rgba(229,83,83,.3);color:var(--red);background:rgba(229,83,83,.08);}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
.confirm-overlay.open{display:flex;}
.confirm-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;max-width:360px;width:100%;text-align:center;animation:fadeUp .25s ease forwards;box-shadow:0 8px 40px var(--shadow);}
.confirm-icon{font-size:28px;margin-bottom:12px;}
.confirm-title{font-size:16px;font-weight:700;margin-bottom:6px;}
.confirm-msg{font-size:13px;color:var(--text-dim);margin-bottom:24px;line-height:1.6;}
.confirm-btns{display:flex;gap:10px;justify-content:center;}
.confirm-yes{background:var(--red);color:#fff;border:none;border-radius:var(--radius);padding:10px 24px;font-family:var(--font);font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:opacity .2s;}
.confirm-yes:hover{opacity:.85;}
.confirm-cancel{background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);border-radius:var(--radius);padding:10px 24px;font-family:var(--font);font-size:12px;cursor:pointer;transition:all .2s;}
.confirm-cancel:hover{border-color:var(--amber);color:var(--amber);}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--amber);color:#0a0a0f;padding:11px 22px;border-radius:8px;font-size:12px;font-weight:700;letter-spacing:1px;z-index:999;animation:fadeUp .3s ease forwards;white-space:nowrap;}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

@media(max-width:768px){
  .nav{padding:0 20px;} .nav-date{display:none;}
  .main{padding:28px 20px;} .status-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div id="passcode-screen">
  <div class="pc-box">
    <div class="pc-logo">CB Dashboard</div>
    <div class="pc-title">Team Access</div>
    <div class="pc-sub">Enter the team passcode to continue</div>
    <input type="password" class="pc-input" id="pc-input" placeholder="· · · · · · · ·" maxlength="30">
    <button class="pc-btn" onclick="doPasscode()">ENTER</button>
    <div class="pc-err" id="pc-err"></div>
  </div>
</div>

<nav class="nav" id="nav" style="display:none">
  <a href="index.html" class="nav-brand">
    <div class="nav-dot"></div>
    <div class="nav-name">CB <span>Dashboard</span></div>
  </a>
  <div class="nav-links">
    <a href="index.html" class="nav-link active">Home</a>
    <a href="reminder.html" class="nav-link">Reminder</a>
    <a href="listing.html" class="nav-link soon">Listing</a>
    <a href="settings.html" class="nav-link">Settings</a>
  </div>
  <div class="nav-right">
    <div class="nav-date" id="nav-date"></div>
    <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
    <button class="nav-logout" onclick="logout()">LOGOUT</button>
  </div>
</nav>

<div id="app">
  <div class="main">
    <div class="page-header">
      <div class="page-label">Overview</div>
      <div class="page-title">Chargeback<br>Dashboard</div>
    </div>
    <div class="status-grid">
      <div class="status-card">
        <div class="status-card-header">
          <div class="status-card-type">Reminder</div>
          <div class="status-badge loading" id="reminder-badge">Loading...</div>
        </div>
        <div class="status-card-title" id="reminder-title">—</div>
        <div class="status-card-meta" id="reminder-meta">Checking...</div>
        <div id="reminder-actions"></div>
      </div>
      <div class="status-card">
        <div class="status-card-header">
          <div class="status-card-type">Listing</div>
          <div class="status-badge loading" id="listing-badge">Loading...</div>
        </div>
        <div class="status-card-title" id="listing-title">—</div>
        <div class="status-card-meta" id="listing-meta">Checking...</div>
        <div id="listing-actions"></div>
      </div>
    </div>
    <div class="section-label">History</div>
    <div class="history-tabs">
      <button class="history-tab active" onclick="switchTab('reminder')">Reminders</button>
      <button class="history-tab" onclick="switchTab('listing')">Listings</button>
    </div>
    <div class="history-list" id="history-list">
      <div class="empty-state"><div class="empty-icon">📋</div>Loading...</div>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-icon">🗑️</div>
    <div class="confirm-title">Delete Entry?</div>
    <div class="confirm-msg" id="confirm-msg">This will permanently remove this entry.</div>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="confirm-yes" id="confirm-yes-btn">Delete</button>
    </div>
  </div>
</div>

<script>
// THEME
(function(){
  const t=localStorage.getItem('cb_theme')||'dark';
  document.documentElement.setAttribute('data-theme',t);
})();
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme');
  const next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('cb_theme',next);
  document.getElementById('theme-btn').textContent=next==='dark'?'🌙':'☀️';
}
function updateThemeBtn(){
  const t=document.documentElement.getAttribute('data-theme');
  const btn=document.getElementById('theme-btn');
  if(btn) btn.textContent=t==='dark'?'🌙':'☀️';
}
updateThemeBtn();

// STATE
let currentTab='reminder', allReminders={}, allListings={};
let pendingDelete=null;

// HELPERS
function todayKey(){const d=new Date();return `${d.getDate()}_${d.toLocaleString('en-GB',{month:'short'})}_${d.getFullYear()}`;}
function monthKey(){const d=new Date();return `${d.toLocaleString('en-GB',{month:'long'})}_${d.getFullYear()}`;}
function formatDate(ts){if(!ts)return'—';return new Date(ts).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function timeAgo(ts){
  const diff=Date.now()-ts, s=Math.floor(diff/1000);
  if(s<60)return`${s} seconds ago`;
  const m=Math.floor(s/60); if(m<60)return`${m} minute${m>1?'s':''} ago`;
  const h=Math.floor(m/60); if(h<24)return`${h} hour${h>1?'s':''} ago`;
  const day=Math.floor(h/24); return`${day} day${day>1?'s':''} ago`;
}

// PASSCODE — sessionStorage
function doPasscode(){
  const val=document.getElementById('pc-input').value.trim();
  const err=document.getElementById('pc-err');
  if(!val){err.textContent='Enter passcode.';return;}
  function tryLogin(){
    window._get(window._ref(window._db,'config/passcode')).then(snap=>{
      const stored=snap.val();
      if(!stored){
        window._set(window._ref(window._db,'config/passcode'),val).then(()=>{
          sessionStorage.setItem('cb_auth',val); enterApp();
        });
      } else if(val===stored){
        sessionStorage.setItem('cb_auth',val); enterApp();
      } else {
        err.textContent='Incorrect passcode.';
        const inp=document.getElementById('pc-input');
        inp.classList.add('err'); setTimeout(()=>inp.classList.remove('err'),400);
      }
    }).catch(()=>{err.textContent='Cannot connect.';});
  }
  if(window.firebaseReady) tryLogin();
  else window.addEventListener('firebaseReady',tryLogin,{once:true});
}
document.getElementById('pc-input').addEventListener('keydown',e=>{if(e.key==='Enter')doPasscode();});

// Auto-login: if session exists, enter immediately, verify in background
(function(){
  const stored=sessionStorage.getItem('cb_auth');
  if(stored){
    document.getElementById('passcode-screen').style.display='none';
    function verifyAndEnter(){
      window._get(window._ref(window._db,'config/passcode')).then(snap=>{
        if(snap.val()===stored){ enterApp(); }
        else{ sessionStorage.removeItem('cb_auth'); document.getElementById('passcode-screen').style.display='flex'; }
      }).catch(()=>{ enterApp(); });
    }
    if(window.firebaseReady) verifyAndEnter();
    else window.addEventListener('firebaseReady', verifyAndEnter, {once:true});
  }
})();

function enterApp(){
  document.getElementById('passcode-screen').style.display='none';
  document.getElementById('nav').style.display='flex';
  document.getElementById('app').style.display='block';
  document.getElementById('nav-date').textContent=
    new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'}).toUpperCase();
  loadData();
}
function logout(){sessionStorage.removeItem('cb_auth');location.reload();}

// DATA
function loadData(){
  window._onValue(window._ref(window._db,'reminders'),snap=>{
    allReminders=snap.val()||{};
    updateReminderCard();
    if(currentTab==='reminder') renderHistory();
  });
  window._onValue(window._ref(window._db,'listings'),snap=>{
    allListings=snap.val()||{};
    updateListingCard();
    if(currentTab==='listing') renderHistory();
  });
}

// STATUS CARDS
function updateReminderCard(){
  const keys=Object.keys(allReminders).sort((a,b)=>(allReminders[b].generated_at||0)-(allReminders[a].generated_at||0));
  const key=keys[0], rec=key?allReminders[key]:null;
  document.getElementById('reminder-badge').className='status-badge '+(rec&&rec.cases?'ready':'missing');
  document.getElementById('reminder-badge').textContent=rec&&rec.cases?'Ready':'Not generated';
  document.getElementById('reminder-title').textContent=rec&&rec.cases?key.replace(/_/g,' '):'No reminders yet';
  document.getElementById('reminder-meta').innerHTML=rec&&rec.cases
    ?`Generated by <strong>${rec.generated_by}</strong><br>${timeAgo(rec.generated_at)}`
    :'No reminder generated yet';
  document.getElementById('reminder-actions').innerHTML=rec&&rec.cases
    ?`<a href="reminder.html?key=${key}" class="card-btn secondary">View Reminder →</a>`
    :`<a href="reminder.html" class="card-btn primary">Go to Reminder →</a>`;
}
function updateListingCard(){
  const keys=Object.keys(allListings).sort((a,b)=>(allListings[b].generated_at||0)-(allListings[a].generated_at||0));
  const key=keys[0], rec=key?allListings[key]:null;
  document.getElementById('listing-badge').className='status-badge '+(rec&&rec.cases?'ready':'missing');
  document.getElementById('listing-badge').textContent=rec&&rec.cases?'Ready':'Not generated';
  document.getElementById('listing-title').textContent=rec&&rec.cases?key.replace(/_/g,' '):'No listings yet';
  document.getElementById('listing-meta').innerHTML=rec&&rec.cases
    ?`Generated by <strong>${rec.generated_by}</strong><br>${timeAgo(rec.generated_at)}`
    :'No listing generated yet';
  document.getElementById('listing-actions').innerHTML=rec&&rec.cases
    ?`<a href="listing.html?key=${key}" class="card-btn secondary">View Listing →</a>`
    :`<a href="listing.html" class="card-btn soon" style="opacity:.4;pointer-events:none">Coming Soon</a>`;
}

// HISTORY
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.history-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='reminder')||(i===1&&tab==='listing')));
  renderHistory();
}
function renderHistory(){
  const list=document.getElementById('history-list');
  const data=currentTab==='reminder'?allReminders:allListings;
  const keys=Object.keys(data).sort((a,b)=>(data[b].generated_at||0)-(data[a].generated_at||0));
  if(!keys.length){
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">${currentTab==='reminder'?'🔔':'📊'}</div>No ${currentTab}s generated yet</div>`;
    return;
  }
  const groups={};
  keys.forEach(key=>{
    const d=new Date(data[key].generated_at||0);
    const mKey=d.toLocaleString('en-GB',{month:'long',year:'numeric'});
    if(!groups[mKey])groups[mKey]=[];
    groups[mKey].push(key);
  });
  const icon=currentTab==='reminder'?'🔔':'📊';
  const target=currentTab==='reminder'?'reminder.html':'listing.html';
  list.innerHTML=Object.keys(groups).map(month=>{
    const items=groups[month].map(key=>{
      const rec=data[key];
      return`<div class="history-item" onclick="window.location.href='${target}?key=${key}'" style="cursor:pointer;">
        <div class="history-item-left">
          <div class="history-icon">${icon}</div>
          <div><div class="history-title">${key.replace(/_/g,' ')}</div><div class="history-meta">By ${rec.generated_by||'—'}</div></div>
        </div>
        <div class="history-right">
          <div class="history-time-wrap">
            <div class="history-time">${formatDate(rec.generated_at)}</div>
            <div class="history-ago">${timeAgo(rec.generated_at)}</div>
          </div>
          <button class="delete-btn" onclick="event.stopPropagation();confirmDelete('${currentTab}','${key}')" title="Delete">🗑</button>
        </div>
      </div>`;
    }).join('');
    return`<div class="month-group"><div class="month-label">${month}</div>${items}</div>`;
  }).join('');
}
function confirmDelete(type,key){
  pendingDelete={type,key};
  document.getElementById('confirm-msg').textContent=`Delete "${key.replace(/_/g,' ')}"? This cannot be undone.`;
  document.getElementById('confirm-yes-btn').onclick=doDelete;
  document.getElementById('confirm-overlay').classList.add('open');
}
function doDelete(){
  if(!pendingDelete)return;
  const {type,key}=pendingDelete;
  const path=type==='reminder'?`reminders/${key}`:`listings/${key}`;
  window._remove(window._ref(window._db,path)).then(()=>{toast('Entry deleted');closeConfirm();}).catch(e=>alert('Delete failed: '+e.message));
}
function closeConfirm(){document.getElementById('confirm-overlay').classList.remove('open');pendingDelete=null;}
document.getElementById('confirm-overlay').addEventListener('click',function(e){if(e.target===this)closeConfirm();});
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent='✓ '+msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2800);}
